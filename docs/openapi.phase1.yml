openapi: 3.1.0
info:
  title: StudyLab Phase 0-2 API
  version: 0.2.0
servers:
  - url: /v1
paths:
  /notebooks:
    post:
      summary: Create a source notebook
  /notebooks/{notebook_id}/sources/upload:
    post:
      summary: Upload text, notes, or extracted PDF text into a notebook
  /notebooks/{notebook_id}/sources/{source_id}:
    get:
      summary: Fetch source metadata and source guide
  /notebooks/{notebook_id}/ask:
    post:
      summary: Ask a hybrid-retrieved, source-grounded notebook question with citations
  /notebooks/{notebook_id}/artifacts/generate:
    post:
      summary: Generate summary notes, study guide, planner, timetable, or revision cards
  /solve:
    post:
      summary: Solve a text or OCR-derived question with verification where possible
  /solve/{solution_id}/reveal:
    post:
      summary: Reveal a stored solution step without re-solving
  /notion/export:
    post:
      summary: Export a generated artifact to Notion
  /notebooks/{notebook_id}/teaching/start:
    post:
      summary: Start a teaching whiteboard session for notebook concepts
  /teaching/{session_id}:
    get:
      summary: Fetch a teaching whiteboard session
  /teaching/{session_id}/next:
    post:
      summary: Advance to the next teaching concept
  /teaching/{session_id}/prev:
    post:
      summary: Return to the previous teaching concept
  /notebooks/{notebook_id}/quizzes/generate:
    post:
      summary: Generate a quiz from notebook sources or a topic hint
  /quizzes/{quiz_id}:
    get:
      summary: Fetch a quiz, hiding answers unless include_answers=true
  /quizzes/{quiz_id}/answer-key:
    post:
      summary: Generate a verified quiz answer key
  /quizzes/{quiz_id}/attempt:
    post:
      summary: Submit quiz answers for auto-evaluation
  /notebooks/{notebook_id}/papers/generate:
    post:
      summary: Generate a question paper from notebook sources
  /papers/{paper_id}:
    get:
      summary: Fetch a question paper, hiding answers unless include_answers=true
  /papers/{paper_id}/answer-key:
    post:
      summary: Generate a verified paper answer key
  /papers/{paper_id}/attempt:
    post:
      summary: Submit paper answers for auto-evaluation
  /reports/{attempt_id}:
    get:
      summary: Fetch an auto-evaluation report
  /reports/{attempt_id}/generate:
    post:
      summary: Generate an auto-evaluation report
