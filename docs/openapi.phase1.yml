openapi: 3.1.0
info:
  title: StudyLab Phase 0-8 API
  version: 0.8.0
servers:
  - url: /v1
paths:
  /notebooks:
    post:
      summary: Create a source notebook
  /notebooks/{notebook_id}/sources/upload:
    post:
      summary: Upload text, notes, or extracted PDF text into a notebook
  /notebooks/{notebook_id}/sources/{source_id}:
    get:
      summary: Fetch source metadata and source guide
  /notebooks/{notebook_id}/ask:
    post:
      summary: Ask a hybrid-retrieved, source-grounded notebook question with citations
  /notebooks/{notebook_id}/artifacts/generate:
    post:
      summary: Generate summary notes, study guide, planner, timetable, or revision cards
  /solve:
    post:
      summary: Solve a text or OCR-derived question with verification where possible
  /solve/{solution_id}/reveal:
    post:
      summary: Reveal a stored solution step without re-solving
  /notion/export:
    post:
      summary: Export a generated artifact to Notion
  /notebooks/{notebook_id}/teaching/start:
    post:
      summary: Start a teaching whiteboard session for notebook concepts
  /teaching/{session_id}:
    get:
      summary: Fetch a teaching whiteboard session
  /teaching/{session_id}/next:
    post:
      summary: Advance to the next teaching concept
  /teaching/{session_id}/prev:
    post:
      summary: Return to the previous teaching concept
  /notebooks/{notebook_id}/quizzes/generate:
    post:
      summary: Generate a quiz from notebook sources or a topic hint
  /quizzes/{quiz_id}:
    get:
      summary: Fetch a quiz, hiding answers unless include_answers=true
  /quizzes/{quiz_id}/answer-key:
    post:
      summary: Generate a verified quiz answer key
  /quizzes/{quiz_id}/attempt:
    post:
      summary: Submit quiz answers for auto-evaluation
  /notebooks/{notebook_id}/papers/generate:
    post:
      summary: Generate a question paper from notebook sources
  /papers/{paper_id}:
    get:
      summary: Fetch a question paper, hiding answers unless include_answers=true
  /papers/{paper_id}/answer-key:
    post:
      summary: Generate a verified paper answer key
  /papers/{paper_id}/attempt:
    post:
      summary: Submit paper answers for auto-evaluation
  /reports/{attempt_id}:
    get:
      summary: Fetch an auto-evaluation report
  /reports/{attempt_id}/generate:
    post:
      summary: Generate an auto-evaluation report
  /notebooks/{notebook_id}/revision/generate-cards:
    post:
      summary: Generate spaced-repetition revision cards from notebook concepts or supplied topics
  /revision/due:
    get:
      summary: List revision cards due today for a user (user_id query param)
  /revision/stats:
    get:
      summary: Revision queue stats (total, due, done, lapsed, avg easiness) for a user
  /revision/{card_id}/review:
    post:
      summary: Grade a revision card (correct boolean) and reschedule it with SM-2
  /student/{user_id}/mastery:
    post:
      summary: Recompute a user's topic mastery for a notebook from their eval reports
  /student/{user_id}/notebook/{notebook_id}/mastery:
    get:
      summary: Fetch a user's stored knowledge state for a notebook
  /student/{user_id}/notebook/{notebook_id}/weak-topics:
    get:
      summary: List a user's weak topics for a notebook
  /analytics/notebook/{notebook_id}/trends:
    get:
      summary: Per-attempt score trend for a notebook
  /analytics/user/{user_id}/summary:
    get:
      summary: A user's overall analytics summary (attempts, avg score, top weak/strong topics, time)
  /voice/stt:
    post:
      summary: Speech-to-text (env-gated provider; mock by default)
  /voice/tts:
    post:
      summary: Text-to-speech (env-gated provider; mock by default)
  /notebooks/{notebook_id}/sources/import:
    post:
      summary: Import a source via a connector (website/youtube/audio/google_doc/google_slides)
  /notebooks/{notebook_id}/imports:
    get:
      summary: List connector imports for a notebook
  /notebooks/{notebook_id}/agent-teaching/start:
    post:
      summary: Start a multi-agent teaching session (explainer/verifier/coach turns per concept)
  /agent-teaching/{session_id}:
    get:
      summary: Fetch a multi-agent teaching session
  /agent-teaching/{session_id}/next:
    post:
      summary: Advance to the next multi-agent teaching concept
  /agent-teaching/{session_id}/prev:
    post:
      summary: Return to the previous multi-agent teaching concept
  /billing/plans:
    get:
      summary: List plan catalog (free/scholar/pro) with prices, quotas, and features
  /billing/subscription/{user_id}:
    get:
      summary: Fetch a user's subscription (defaults to free on first read)
  /billing/usage/{user_id}:
    get:
      summary: Usage summary for the current billing period (used/limit/remaining per action)
  /billing/{user_id}/subscribe:
    post:
      summary: Change a user's plan via the billing provider (mock or Stripe)
  /billing/{user_id}/usage:
    post:
      summary: Record a metered action for a user
  /auth/register:
    post:
      summary: Register a user (email + password) and return a Bearer JWT
  /auth/login:
    post:
      summary: Authenticate and return a Bearer JWT
  /auth/me:
    get:
      summary: Return the authenticated user for the supplied Bearer token
  /metrics:
    get:
      summary: Observability snapshot (gated behind auth when STUDYLAB_REQUIRE_AUTH is set)
  /ready:
    get:
      summary: Readiness probe (process up + store opened); returns version and store type
  /auth/password/forgot:
    post:
      summary: Request a password-reset token (emailed in prod; returned in mock mode)
  /auth/password/reset:
    post:
      summary: Set a new password using a purpose-scoped reset token
  /auth/password/change:
    post:
      summary: Change password for the authenticated user (Bearer token required)
  /auth/profile:
    post:
      summary: Update the authenticated user's subject_domain / prefs
  /auth/delete:
    post:
      summary: Delete the authenticated user's account and cascade their data
  /notebooks/{notebook_id}/shares:
    get:
      summary: List who a notebook is shared with (owner only)
    post:
      summary: Share a notebook with another user by email (viewer or editor)
  /notebooks/{notebook_id}/shares/remove:
    post:
      summary: Revoke a notebook share (owner only)
  /notebooks/shared-with-me:
    get:
      summary: List notebooks shared with the authenticated user
  /admin/users:
    get:
      summary: List all users (admin role required)
  /admin/metrics:
    get:
      summary: Observability snapshot (admin role required)
  /admin/users/{user_id}/role:
    post:
      summary: Set a user's role (admin only; used to mint instructors)
  /classes:
    get:
      summary: List classes the authenticated user instructs or is enrolled in
    post:
      summary: Create a class (instructor or admin role required)
  /classes/enroll:
    post:
      summary: Enroll in a class with its short join code
  /classes/{class_id}/roster:
    get:
      summary: List the roster of a class (instructor only)
  /classes/{class_id}/assignments:
    get:
      summary: List assignments for a class (instructor or enrolled student)
    post:
      summary: Create a quiz/paper assignment for the class (instructor only)
  /classes/{class_id}/analytics:
    get:
      summary: Class-wide analytics — completion rate, avg score, top weak topics (instructor only)
  /assignments/me:
    get:
      summary: List the authenticated student's assignments across all enrolled classes
  /assignments/{assignment_id}/submit:
    post:
      summary: Submit answers for an assignment (enrolled student); evaluates + links to assignment
  /assignments/{assignment_id}/submissions:
    get:
      summary: List all submissions for an assignment (instructor only)
