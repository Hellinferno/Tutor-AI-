services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: studylab
      POSTGRES_PASSWORD: studylab
      POSTGRES_DB: studylab
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/gateway.Dockerfile
    env_file:
      - ../../.env.example
    environment:
      STUDYLAB_SQLITE_PATH: /data/studylab.db
    volumes:
      - studylab_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
  rag:
    build:
      context: ../..
      dockerfile: infra/docker/rag.Dockerfile
    env_file:
      - ../../.env.example
    environment:
      STUDYLAB_SQLITE_PATH: /data/studylab.db
      RAG_PORT: "8001"
    volumes:
      - studylab_data:/data
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - qdrant
  solver:
    build:
      context: ../..
      dockerfile: infra/docker/solver.Dockerfile
    env_file:
      - ../../.env.example
    environment:
      STUDYLAB_SQLITE_PATH: /data/studylab.db
      SOLVER_PORT: "8002"
    volumes:
      - studylab_data:/data
    ports:
      - "8002:8002"
    depends_on:
      - postgres

volumes:
  studylab_data:
